<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ title }}</title>
<link rel="stylesheet" href="https://uicdn.toast.com/calendar/latest/toastui-calendar.min.css" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "SF Pro Display", -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
                 "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    background: #e2e8f0;
  }
  #capture-root {
    padding: 24px;
    background:
      radial-gradient(circle at top left, rgba(59, 130, 246, 0.18), transparent 32%),
      linear-gradient(140deg, #e0f2fe 0%, #eef2ff 42%, #f8fafc 100%);
  }
  #app-wrapper {
    width: 100%;
    max-width: 1400px;
    margin: 0 auto;
    background: #ffffff;
    border-radius: 24px;
    box-shadow: 0 25px 60px -20px rgba(15,23,42,0.24), 0 0 0 1px rgba(255,255,255,0.8);
    overflow: hidden;
  }
  #header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 16px;
    padding: 28px 32px 18px;
    background:
      radial-gradient(circle at top left, rgba(59, 130, 246, 0.12), transparent 35%),
      linear-gradient(180deg, rgba(255,255,255,0.98), rgba(248,250,252,0.92));
  }
  #header h1 {
    font-size: 30px;
    font-weight: 800;
    color: #0f172a;
    letter-spacing: -0.03em;
    line-height: 1.2;
  }
  #header .date-range {
    font-size: 15px;
    color: #64748b;
    font-weight: 700;
  }
  #legend {
    display: flex;
    gap: 10px;
    padding: 0 32px 18px;
    background: #ffffff;
    flex-wrap: wrap;
  }
  .legend-item {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: #334155;
    background: #f8fafc;
    padding: 7px 14px;
    border-radius: 100px;
    font-weight: 700;
    border: 1px solid #e2e8f0;
  }
  .legend-dot {
    width: 9px;
    height: 9px;
    border-radius: 50%;
    display: inline-block;
  }
  #calendar-container {
    height: {{ height }}px;
    padding: 0 18px 18px;
    background: #ffffff;
  }
  .toastui-calendar-panel-resizer,
  .toastui-calendar-panel-resizer-guide { display: none !important; }
  .toastui-calendar-time { overflow: visible !important; background: #ffffff; }
  .toastui-calendar-panel:not(.toastui-calendar-time) { display: none !important; }
  .toastui-calendar-week-view-day-names {
    position: sticky;
    top: 0;
    z-index: 10;
    background: #ffffff;
    border-bottom: 1px solid #eef2f7 !important;
  }
  [class*="toastui-calendar"] { overflow: visible !important; border: none !important; }
  .toastui-calendar-weekday-event-dot { display: none !important; }
  .toastui-calendar-time-grid-event {
    border-radius: 14px !important;
    box-shadow: 0 10px 20px rgba(15,23,42,0.10) !important;
    border: 1px solid rgba(255,255,255,0.75) !important;
    font-weight: 700 !important;
    padding: 6px 8px !important;
  }
  .toastui-calendar-week-view-day-name {
    font-weight: 700;
    color: #475569;
    font-size: 14px;
  }
  .toastui-calendar-time-grid-cell {
    border-color: #edf2f7 !important;
  }
  .toastui-calendar-timegrid-left {
    border-right: 1px solid #edf2f7 !important;
    background: #f8fafc !important;
  }
  .toastui-calendar-timegrid-hour {
    color: #94a3b8 !important;
    font-weight: 700;
    font-size: 12px;
  }
  .event-title {
    font-size: 14px;
    line-height: 1.35;
    font-weight: 800;
    letter-spacing: -0.01em;
  }
</style>
</head>
<body>
<div id="capture-root">
  <div id="app-wrapper">
    <div id="header">
      <h1>📅 {{ title }}</h1>
      <span class="date-range">{{ date_range }}</span>
    </div>
    {% if categories %}
    <div id="legend">
      {% for cat_name, cat_info in categories.items() %}
      <span class="legend-item">
        <span class="legend-dot" style="background: {{ cat_info.color }};"></span>
        {{ cat_info.icon }} {{ cat_name }}
      </span>
      {% endfor %}
    </div>
    {% endif %}
    <div id="calendar-container"></div>
  </div>
</div>

<script src="https://uicdn.toast.com/calendar/latest/toastui-calendar.min.js"></script>
<script>
const Calendar = tui.Calendar;

const calendars = [
  {% for cat_name, cat_info in categories.items() %}
  {
    id: {{ cat_name | tojson }},
    name: {{ cat_name | tojson }},
    backgroundColor: {{ cat_info.color | tojson }},
    borderColor: {{ cat_info.color | tojson }},
    color: {{ cat_info.text_color | tojson }},
  },
  {% endfor %}
];

const events = [
  {% for event in events %}
  {
    id: {{ event.id | tojson }},
    calendarId: {{ event.category | tojson }},
    title: {{ (event.icon ~ ' ' ~ event.title) | tojson }},
    start: {{ event.start_iso | tojson }},
    end: {{ event.end_iso | tojson }},
    category: 'time',
    isReadOnly: true,
    {% if event.location %}
    location: {{ event.location | tojson }},
    {% endif %}
    {% if event.participants %}
    attendees: [{% for p in event.participants %}{{ p | tojson }}{% if not loop.last %}, {% endif %}{% endfor %}],
    {% endif %}
  },
  {% endfor %}
];

const cal = new Calendar('#calendar-container', {
  defaultView: '{{ view }}',
  usageStatistics: false,
  isReadOnly: true,
  useDetailPopup: false,
  useFormPopup: false,
  week: {
    startDayOfWeek: 1,
    dayNames: ['日', '一', '二', '三', '四', '五', '六'],
    hourStart: {{ hour_start }},
    hourEnd: {{ hour_end }},
    taskView: false,
    eventView: ['time'],
    showNowIndicator: false,
  },
  month: {
    startDayOfWeek: 1,
    dayNames: ['日', '一', '二', '三', '四', '五', '六'],
    isAlways6Weeks: false,
  },
  calendars: calendars,
  template: {
    monthDayName(model) {
      return `<span>${model.label}</span>`;
    },
    time(event) {
      return `<span class="event-title">${event.title}</span>`;
    },
    allday(event) {
      return `<span>${event.title}</span>`;
    },
  },
  timezone: {
    zones: [{ timezoneName: 'Asia/Shanghai' }],
  },
});

cal.setDate(new Date('{{ focus_date }}'));
cal.createEvents(events);
</script>
</body>
</html>
